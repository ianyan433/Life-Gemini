<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>浮生录 - 无尽人生模拟器 V4 终极版</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-panel: #18181b;
            --bg-card: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --grey-ind: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; user-select: none; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 界面布局 */
        .app-container { width: 100%; max-width: 1200px; height: 100vh; display: flex; flex-direction: row; background: var(--bg-dark); box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        @media (max-width: 800px) { .app-container { flex-direction: column; overflow-y: auto; height: 100vh; } }

        /* 启动屏 & 成就屏 */
        .overlay-screen { position: absolute; inset: 0; background: linear-gradient(135deg, #09090b 0%, #18181b 100%); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; transition: opacity 0.5s; }
        .title-glitch { font-size: 4rem; font-weight: 900; background: linear-gradient(to right, #fff, #a1a1aa); -webkit-background-clip: text; color: transparent; margin-bottom: 10px; letter-spacing: 6px; text-align: center;}
        .subtitle { color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem; text-align: center;}
        .menu-btn { background: var(--accent); color: white; border: none; padding: 16px 45px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; transition: all 0.3s; margin: 10px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .menu-btn:hover { background: var(--accent-hover); transform: translateY(-3px); }
        .menu-btn.alt { background: var(--bg-card); border: 1px solid #3f3f46; box-shadow: none; }
        .menu-btn.alt:hover { background: #3f3f46; color: white; }

        /* 左侧状态栏 */
        .sidebar { width: 340px; background: var(--bg-panel); border-right: 1px solid #27272a; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; z-index: 10; }
        @media (max-width: 800px) { .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #27272a; height: 45vh; } }
        
        .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #27272a; padding-bottom: 15px; }
        .age-display { font-size: 2.8rem; font-weight: bold; color: var(--accent); line-height: 1; }
        .stage-display { font-size: 1.1rem; color: var(--text-muted); margin-top: 5px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .info-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; font-size: 0.85rem; border: 1px solid #27272a; }
        .info-box span { display: block; color: var(--text-muted); margin-bottom: 4px; font-size: 0.75rem; }
        .info-box strong { color: #fff; font-size: 1rem; }

        .attr-container { display: flex; flex-direction: column; gap: 14px; }
        .attr-row { display: flex; flex-direction: column; gap: 6px; }
        .attr-header { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }
        .attr-bar-bg { width: 100%; height: 8px; background: #27272a; border-radius: 4px; overflow: hidden; }
        .attr-bar-fill { height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 颜色区分 */
        .fill-int { background: #3b82f6; } .fill-phy { background: #10b981; } .fill-cha { background: #ec4899; }
        .fill-wea { background: #f59e0b; } .fill-hap { background: #8b5cf6; } .fill-luc { background: #14b8a6; }

        /* 右侧主交互区 */
        .main-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); position: relative; height: 100%; }
        
        .log-window { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        @media (max-width: 800px) { .log-window { padding: 15px; height: 25vh; flex-grow: 0; } }
        
        .log-item { background: var(--bg-panel); border-left: 4px solid #3f3f46; padding: 14px 18px; border-radius: 0 8px 8px 0; font-size: 0.95rem; line-height: 1.6; animation: slideInRight 0.3s ease forwards; opacity: 0; transform: translateX(20px); }
        .log-item.special { border-left-color: var(--accent); background: rgba(59, 130, 246, 0.08); font-weight: bold; }
        .log-item.danger { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.08); }
        .log-item.warning { border-left-color: var(--warning); background: rgba(245, 158, 11, 0.08); }
        .log-item.grey { border-left-color: var(--grey-ind); background: rgba(139, 92, 246, 0.08); }
        
        /* 日常选项区 (底部) - 支持滚动，容纳海量选项 */
        .choices-panel { padding: 20px 25px; background: var(--bg-panel); border-top: 1px solid #27272a; display: flex; flex-direction: column; gap: 10px; max-height: 45vh; overflow-y: auto; }
        @media (max-width: 800px) { .choices-panel { max-height: 30vh; } }

        .choice-btn { background: var(--bg-card); border: 1px solid #3f3f46; color: var(--text-main); padding: 15px; border-radius: 10px; font-size: 0.95rem; text-align: left; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; display: flex; justify-content: space-between; align-items: center; }
        .choice-btn:hover:not(:disabled) { background: #3f3f46; border-color: var(--text-muted); transform: translateX(5px); }
        .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .choice-req { font-size: 0.8rem; color: var(--danger); font-weight: normal; }

        /* 弹窗系统 (特殊事件/人生转折) */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; opacity: 0; transition: opacity 0.3s; }
        .modal-box { background: var(--bg-panel); border: 1px solid #3f3f46; padding: 35px; border-radius: 20px; width: 100%; max-width: 650px; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); transform: scale(0.95); transition: transform 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-title { font-size: 1.8rem; margin-bottom: 15px; color: #fff; text-align: center; }
        .modal-desc { font-size: 1.05rem; color: #d4d4d8; line-height: 1.7; margin-bottom: 25px; text-align: center; }
        
        /* 成就展示区 */
        .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-height: 60vh; overflow-y: auto; margin: 20px 0; padding: 10px; width: 100%; max-width: 900px; }
        .ach-card { background: var(--bg-panel); border: 1px solid #3f3f46; padding: 15px; border-radius: 12px; text-align: center; opacity: 0.4; filter: grayscale(1); transition: all 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 140px;}
        .ach-card.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--warning); background: rgba(245, 158, 11, 0.1); box-shadow: 0 4px 15px rgba(245,158,11,0.2); }
        .ach-icon { font-size: 2.2rem; margin-bottom: 8px; }
        .ach-name { font-weight: bold; font-size: 1rem; color: #fff; }
        .ach-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; line-height: 1.4; }

        /* 悬浮控件 */
        .float-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 30; }
        .icon-btn { background: var(--bg-panel); border: 1px solid #3f3f46; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; font-size: 1.2rem;}
        .icon-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        .hidden { display: none !important; }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="startScreen" class="overlay-screen">
        <h1 class="title-glitch">浮生录 <span style="font-size: 1rem; color: var(--accent); vertical-align: top;">V4</span></h1>
        <p class="subtitle">无尽的平行宇宙，你只能在其中活一次。</p>
        <button class="menu-btn" onclick="game.startNewLife()">投胎入世</button>
        <button class="menu-btn alt" onclick="ui.showAchievements()">灵魂成就馆</button>
    </div>

    <div id="achScreen" class="overlay-screen hidden">
        <h2 style="font-size: 2.2rem; margin-bottom: 5px;">轮回成就馆</h2>
        <p style="color: var(--text-muted);">你在无尽轮回中刻下的灵魂印记</p>
        <div class="achievements-grid" id="achGrid"></div>
        <button class="menu-btn alt" onclick="ui.hideAchievements()">返回主界面</button>
    </div>

    <div class="app-container hidden" id="gameUI">
        <div class="float-controls">
            <button class="icon-btn" id="musicBtn" onclick="audio.toggle()" title="开启/关闭环境音">🔇</button>
        </div>

        <div class="sidebar">
            <div class="profile-header">
                <div>
                    <div class="age-display"><span id="ui-age">0</span> 岁</div>
                    <div class="stage-display" id="ui-stage">婴儿期</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-box"><span>当前学历</span><strong id="ui-edu">文盲</strong></div>
                <div class="info-box"><span>当前职业</span><strong id="ui-career">无</strong></div>
                <div class="info-box"><span>情感状态</span><strong id="ui-partner">单身</strong></div>
                <div class="info-box"><span>流动资产</span><strong id="ui-wealth" style="color:var(--warning)">0 万</strong></div>
            </div>

            <div class="attr-container">
                <div class="attr-row"><div class="attr-header"><span>🧠 智力</span><span id="v-int">0</span></div><div class="attr-bar-bg"><div class="attr-bar-fill fill-int" id="b-int"></div></div></div>
                <div class="attr-row"><div class="attr-header"><span>💪 体质 (红线警告)</span><span id="v-phy">0</span></div><div class="attr-bar-bg"><div class="attr-bar-fill fill-phy" id="b-phy"></div></div></div>
                <div class="attr-row"><div class="attr-header"><span>✨ 魅力</span><span id="v-cha">0</span></div><div class="attr-bar-bg"><div class="attr-bar-fill fill-cha" id="b-cha"></div></div></div>
                <div class="attr-row"><div class="attr-header"><span>💰 财商</span><span id="v-wea">0</span></div><div class="attr-bar-bg"><div class="attr-bar-fill fill-wea" id="b-wea"></div></div></div>
                <div class="attr-row"><div class="attr-header"><span>🍀 幸福</span><span id="v-hap">0</span></div><div class="attr-bar-bg"><div class="attr-bar-fill fill-hap" id="b-hap"></div></div></div>
                <div class="attr-row"><div class="attr-header"><span>🎲 幸运 (隐藏)</span><span id="v-luc">0</span></div><div class="attr-bar-bg"><div class="attr-bar-fill fill-luc" id="b-luc"></div></div></div>
            </div>
        </div>

        <div class="main-area">
            <div class="log-window" id="logBox"></div>
            <div class="choices-panel" id="choiceBox"></div>
        </div>
    </div>

    <div class="modal-overlay" id="specialModal">
        <div class="modal-box">
            <h2 class="modal-title" id="modalTitle">命运转折</h2>
            <p class="modal-desc" id="modalDesc">描述...</p>
            <div class="choices-panel" style="padding:0; border:none; background:transparent; max-height:none; overflow:visible;" id="modalChoices">
                </div>
        </div>
    </div>

    <script>
        // ================= 扩展成就库 (21个) =================
        const ACH_DATA = {
            "提线木偶": { icon: "🍼", desc: "童年时期完全听从父母安排，失去自我。" },
            "混世魔王": { icon: "😈", desc: "自小叛逆，掀翻规则。" },
            "天之骄子": { icon: "🎓", desc: "成功考入顶尖985学府。" },
            "辍学青年": { icon: "🚬", desc: "放弃学业，早早混迹社会。" },
            "艺术泰斗": { icon: "🎨", desc: "在艺术领域达到巅峰。" },
            "格子衫狂魔": { icon: "💻", desc: "成为大厂程序员并疯狂爆肝。" },
            "仁心圣手": { icon: "⚕️", desc: "成为名医，救死扶伤。" },
            "黑道教父": { icon: "🕶️", desc: "在灰色产业中爬到权力顶端。" },
            "铁窗泪": { icon: "⛓️", desc: "因非法活动锒铛入狱。" },
            "倾家荡产": { icon: "📉", desc: "经历破产危机，资产清零。" },
            "天降横财": { icon: "🎰", desc: "凭借极高幸运中大奖或暴富。" },
            "孤岛隐士": { icon: "🏝️", desc: "生命垂危时放弃一切，归隐荒野。" },
            "绝处逢生": { icon: "❤️‍🩹", desc: "在绝症危机中依靠昂贵治疗活下来。" },
            "海王情圣": { icon: "🌹", desc: "在感情中游刃有余（频繁更换伴侣）。" },
            "大彻大悟": { icon: "📿", desc: "在绝望危机中选择剃度出家。" },
            "富可敌国": { icon: "💎", desc: "生前流动资产突破 1000 万。" },
            "环游世界": { icon: "✈️", desc: "在中晚年抛下束缚去环游世界。" },
            "桃李满天下": { icon: "📚", desc: "作为人民教师度过一生。" },
            "平平淡淡": { icon: "🍵", desc: "做着普通工作，安稳度过一生。" },
            "英年早逝": { icon: "🪦", desc: "在 35 岁之前因体质耗尽离世。" },
            "福寿双全": { icon: "🌅", desc: "活过 80 岁且无疾而终。" }
        };

        // ================= 核心游戏引擎 =================
        class Engine {
            constructor() {
                this.loadAchievements();
                this.reset();
            }

            reset() {
                this.age = 0; this.isDead = false;
                this.attrs = { int: 0, phy: 0, cha: 0, wea: 0, hap: 0, luc: 0 };
                this.state = {
                    edu: "未启蒙", career: "无", partner: "单身", cash: 0, stage: "婴儿期",
                    flags: {}, // 命运标签
                    usedEvents: new Set() // 去重机制
                };
            }

            loadAchievements() {
                try { this.achievements = JSON.parse(localStorage.getItem('life_achievements_v4')) || {}; } 
                catch(e) { this.achievements = {}; }
            }
            saveAchievement(id) {
                if(!this.achievements[id]) {
                    this.achievements[id] = true;
                    localStorage.setItem('life_achievements_v4', JSON.stringify(this.achievements));
                    ui.log(`🏆 灵魂铭刻：解锁成就【${id}】`, "special");
                }
            }

            startNewLife() {
                this.reset();
                // 初始投胎属性 (确保每局差异巨大)
                this.attrs = {
                    int: Math.floor(Math.random() * 50) + 10,
                    phy: Math.floor(Math.random() * 40) + 30,
                    cha: Math.floor(Math.random() * 50) + 10,
                    wea: Math.floor(Math.random() * 40) + 5,
                    hap: Math.floor(Math.random() * 40) + 40,
                    luc: Math.floor(Math.random() * 90) + 5
                };
                
                ui.switchScreen('game');
                document.getElementById('logBox').innerHTML = '';
                ui.log(`【0岁】 伴随着一阵啼哭，你来到了这个世界。<br>初始天资 -> 智力:${this.attrs.int} | 体质:${this.attrs.phy} | 魅力:${this.attrs.cha} | 财商:${this.attrs.wea}`, "special");
                ui.update();
                
                this.generateYearOptions();
            }

            modAttr(changes) {
                if(!changes) return;
                ['int', 'phy', 'cha', 'wea', 'hap', 'luc'].forEach(k => {
                    if(changes[k]) this.attrs[k] = Math.max(0, Math.min(100, this.attrs[k] + changes[k]));
                });
                if(changes.cash) this.state.cash += changes.cash;
            }

            advanceYear() {
                if (this.isDead) return;
                this.age++;
                
                // 1. 阶段判定
                if (this.age < 3) this.state.stage = "婴儿期";
                else if (this.age <= 12) this.state.stage = "童年期";
                else if (this.age <= 17) this.state.stage = "青春期";
                else if (this.age <= 22) this.state.stage = "大学/青涩期";
                else if (this.age <= 35) this.state.stage = "青年期";
                else if (this.age <= 55) this.state.stage = "中年期";
                else this.state.stage = "晚年期";

                // 2. 岁数与职业造成的体质/财富流失
                let phyDrop = this.age > 45 ? 2 : (this.age > 60 ? 3 : 1);
                if (this.state.career === "大厂程序员") { phyDrop += 4; this.state.cash += 35; }
                else if (this.state.career === "三甲医生") { phyDrop += 3; this.state.cash += 25; }
                else if (this.state.career === "底层马仔") { phyDrop += 5; this.state.cash += (Math.random()>0.5?60:5); }
                else if (this.state.career === "黑道头目") { phyDrop += 3; this.state.cash += 150; }
                else if (this.state.career === "人民教师") { phyDrop += 1; this.state.cash += 10; }
                else if (this.state.career === "艺术家") { phyDrop += 1; this.state.cash += (Math.random()>0.7?50:2); }
                else if (this.state.career === "隐士" || this.state.career === "出家人") { phyDrop = -2; this.attrs.hap += 2; }
                else if (this.state.career !== "无" && this.state.career !== "囚犯") { this.state.cash += 8; }
                
                // 生活开销
                if(this.age > 22 && this.state.career !== "隐士" && this.state.career !== "囚犯" && this.state.career !== "出家人") {
                    this.state.cash -= (this.state.partner==="已婚" ? 5 : 2);
                }
                this.modAttr({phy: -phyDrop});

                // 3. 拦截：体质濒危事件
                if (this.attrs.phy <= 15 && !this.state.flags.healthCrisis) {
                    this.state.flags.healthCrisis = true;
                    return this.triggerHealthCrisis();
                }

                // 4. 拦截：破产危机事件
                if (this.state.cash < -20 && !this.state.flags.bankruptCrisis) {
                    this.state.flags.bankruptCrisis = true;
                    return this.triggerBankruptcy();
                }

                // 5. 拦截：绝望抑郁危机
                if (this.attrs.hap <= 10 && !this.state.flags.despairCrisis && this.age > 18) {
                    this.state.flags.despairCrisis = true;
                    return this.triggerDespair();
                }

                // 6. 死亡判定
                if (this.attrs.phy <= 0) return this.triggerDeath("由于身体机能枯竭或过度劳累，你的心脏停止了跳动。");
                if (this.age >= 80 && Math.random() < 0.15) return this.triggerDeath("你在睡梦中安详地闭上了眼睛。");
                if (this.age > 95) return this.triggerDeath("你走到了人类寿命的极限。");

                ui.update();

                // 7. 强制年龄主线事件 (10个里程碑)
                let milestone = MILESTONES.find(m => m.age === this.age);
                if (milestone && (!milestone.req || milestone.req(this))) {
                    ui.showModal(milestone.title, milestone.desc, milestone.choices);
                    return;
                }

                // 8. 正常生成年度随机选项 (展现 5-8 个选项)
                this.generateYearOptions();
            }

            generateYearOptions() {
                let pool = EVENT_POOL.filter(e => 
                    e.minAge <= this.age && e.maxAge >= this.age && 
                    !this.state.usedEvents.has(e.id) && 
                    (!e.req || e.req(this))
                );

                pool.sort(() => Math.random() - 0.5);
                let choiceCount = Math.floor(Math.random() * 4) + 5; // 5 到 8 个选项
                let options = pool.slice(0, choiceCount);
                
                if(options.length === 0) {
                    options = [{ id: 'default', text: "平淡地度过了一年", log: "无事发生，平平淡淡才是真。", eff: { hap: 1, phy: 1 } }];
                }

                ui.renderChoices(options);
            }

            executeChoice(choice) {
                if (choice.id !== 'default') this.state.usedEvents.add(choice.id);
                if (choice.eff) this.modAttr(choice.eff);
                if (choice.setFlag) for(let k in choice.setFlag) this.state.flags[k] = choice.setFlag[k];
                if (choice.stateChange) {
                    if (choice.stateChange.edu) this.state.edu = choice.stateChange.edu;
                    if (choice.stateChange.career) this.state.career = choice.stateChange.career;
                    if (choice.stateChange.partner) this.state.partner = choice.stateChange.partner;
                }
                
                let cssClass = choice.type || "";

            { id: 'l1', minAge: 18, maxAge: 60, req: g=>g.attrs.luc > 85 && g.state.cash < 50, text: "随手买了一张彩票", log: "天降横财！！你中了头奖！！", eff: {cash: 1000, hap: 50, wea: -10}, type: "special" },
            { id: 'l2', minAge: 18, maxAge: 70, req: g=>g.attrs.luc > 80, text: "走在路上突然被星探/贵人发掘", log: "你的命运齿轮开始转动。", eff: {cha: 30, wea: 20, cash: 50}, type: "special" }
        ];

        // ================= UI与交互控制器 =================
        const ui = {
            switchScreen(screen) {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('achScreen').classList.add('hidden');
                document.getElementById('gameUI').classList.add('hidden');
                if (screen === 'start') document.getElementById('startScreen').classList.remove('hidden');
                if (screen === 'ach') {
                    document.getElementById('achScreen').classList.remove('hidden');
                    this.renderAchievements();
                }
                if (screen === 'game') document.getElementById('gameUI').classList.remove('hidden');
            },
            showAchievements() { this.switchScreen('ach'); },
            hideAchievements() { this.switchScreen('start'); },
            
            renderAchievements() {
                const grid = document.getElementById('achGrid');
                grid.innerHTML = '';
                for(let key in ACH_DATA) {
                    let has = game.achievements[key];
                    grid.innerHTML += `
                        <div class="ach-card ${has?'unlocked':''}">
                            <div class="ach-icon">${ACH_DATA[key].icon}</div>
                            <div class="ach-name">${key}</div>
                            <div class="ach-desc">${has ? ACH_DATA[key].desc : '???' }</div>
                        </div>`;
                }
            },

            update() {
                document.getElementById('ui-age').innerText = game.age;
                document.getElementById('ui-stage').innerText = game.state.stage;
                document.getElementById('ui-edu').innerText = game.state.edu;
                document.getElementById('ui-career').innerText = game.state.career;
                document.getElementById('ui-partner').innerText = game.state.partner;
                
                let cashDom = document.getElementById('ui-wealth');
                cashDom.innerText = game.state.cash + " 万";
                if(game.state.cash < 0) cashDom.style.color = "var(--danger)";
                else cashDom.style.color = "var(--warning)";

                ['int', 'phy', 'cha', 'wea', 'hap', 'luc'].forEach(k => {
                    document.getElementById(`v-${k}`).innerText = game.attrs[k];
                    document.getElementById(`b-${k}`).style.width = `${game.attrs[k]}%`;
                });
            },

            log(text, cssClass = "") {
                const box = document.getElementById('logBox');
                const div = document.createElement('div');
                div.className = `log-item ${cssClass}`;
                div.innerHTML = text;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            },

            renderChoices(options) {
                const box = document.getElementById('choiceBox');
                box.innerHTML = '';
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    
                    let disable = false;
                    if(opt.req && !opt.req(game)) disable = true;
                    
                    if(disable) {
                        btn.disabled = true;
                        btn.innerHTML = `<span>${opt.text}</span> <span class="choice-req">[条件不足]</span>`;
                    } else {
                        btn.innerHTML = `<span>${opt.text}</span>`;
                        btn.onclick = () => {
                            box.innerHTML = ''; // 清空防误触
                            game.executeChoice(opt);
                        };
                    }
                    box.appendChild(btn);
                });
                box.scrollTop = 0; // 滚动回顶部
            },

            showModal(title, desc, choices) {
                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalDesc').innerHTML = desc;
                const box = document.getElementById('modalChoices');
                box.innerHTML = '';
                
                choices.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.style.marginBottom = '10px';
                    
                    let disable = false;
                    if(opt.req && !opt.req(game)) disable = true;
                    
                    if(disable) {
                        btn.disabled = true;
                        btn.innerHTML = `<span>${opt.text}</span> <span class="choice-req">[条件不足]</span>`;
                    } else {
                        btn.innerHTML = `<span>${opt.text}</span>`;
                        btn.onclick = () => {
                            document.getElementById('specialModal').classList.remove('active');
                            opt.action();
                        };
                    }
                    box.appendChild(btn);
                });
                
                document.getElementById('specialModal').classList.add('active');
            }
        };

        // ================= 极简音频引擎 =================
        const audio = {
            ctx: null, isPlaying: false, timer: null,
            init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            toggle() {
                if(!this.ctx) this.init();
                if(this.isPlaying) this.stop(); else this.start();
                document.getElementById('musicBtn').innerText = this.isPlaying ? "🔊" : "🔇";
                document.getElementById('musicBtn').style.background = this.isPlaying ? "var(--accent)" : "var(--bg-panel)";
            },
            start() {
                this.isPlaying = true;
                const notes = [196, 220, 261.63, 329.63, 392]; // C大调五声音阶 (沉浸感)
                this.timer = setInterval(() => {
                    if(!this.isPlaying) return;
                    try {
                        let osc = this.ctx.createOscillator();
                        let gain = this.ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(notes[Math.floor(Math.random()*notes.length)], this.ctx.currentTime);
                        gain.gain.setValueAtTime(0.015, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 2.5);
                        osc.connect(gain); gain.connect(this.ctx.destination);
                        osc.start(); osc.stop(this.ctx.currentTime + 2.5);
                    }catch(e){}
                }, 2500);
            },
            stop() { this.isPlaying = false; clearInterval(this.timer); }
        };

        // 启动实例
        const game = new Engine();
    </script>
